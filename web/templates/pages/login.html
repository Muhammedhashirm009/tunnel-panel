{{define "login.html"}}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <meta name="description" content="TunnelPanel — Server Control Panel Login">
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="logo">
                <div class="icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
                        <line x1="4" x2="4" y1="22" y2="15" />
                    </svg>
                </div>
                <h2>TunnelPanel</h2>
                <p>Server Control Panel</p>
            </div>

            <div class="login-error" id="loginError"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="Enter your username" autocomplete="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Enter your password" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn"
                    style="width:100%; justify-content:center; margin-top:8px;">
                    <span id="loginBtnText">Sign In</span>
                    <div class="spinner" id="loginSpinner" style="display:none;"></div>
                </button>
            </form>

            <p style="text-align:center; margin-top:24px; color:var(--text-muted); font-size:0.78rem;">
                Forgot password? Use <code style="color:var(--text-accent);">tunnelpanel-cli password reset</code> via
                SSH
            </p>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const btnText = document.getElementById('loginBtnText');
            const errorEl = document.getElementById('loginError');

            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'Signing in...';
            errorEl.style.display = 'none';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await resp.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
            }

            btn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Sign In';
        }
    </script>
</body>

</html>
{{end}}
