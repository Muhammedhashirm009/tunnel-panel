{{define "filemanager.html"}}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .fm-toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .fm-breadcrumb {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .fm-breadcrumb a {
            color: var(--text-accent);
            text-decoration: none;
        }

        .fm-breadcrumb a:hover {
            text-decoration: underline;
        }

        .fm-breadcrumb .sep {
            color: var(--text-muted);
        }

        .fm-table {
            width: 100%;
            border-collapse: collapse;
        }

        .fm-table th {
            text-align: left;
            padding: 8px 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        .fm-table td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.85rem;
        }

        .fm-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .fm-table .name {
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fm-table .name:hover {
            color: var(--text-accent);
        }

        .fm-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            color: var(--text-muted);
        }

        .fm-icon.folder-icon {
            color: var(--accent-amber);
        }

        .fm-actions {
            display: flex;
            gap: 4px;
        }

        .fm-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            font-size: 0.85rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }

        .fm-actions button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .fm-info {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .fm-search {
            display: flex;
            gap: 8px;
        }

        .editor-container {
            display: none;
        }

        .editor-container.active {
            display: block;
        }

        .editor-textarea {
            width: 100%;
            min-height: 400px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            resize: vertical;
            tab-size: 4;
        }

        .editor-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        {{template "sidebar" .}}
        <main class="main-content">
            <div class="page-header">
                <h1>File Manager</h1>
                <p>Browse, edit, and manage server files</p>
            </div>

            <div class="page-body">
                <!-- Browser View -->
                <div id="browserView">
                    <div class="card">
                        <div class="card-header">
                            <div class="fm-breadcrumb" id="breadcrumb"></div>
                            <div class="fm-search">
                                <input type="text" class="form-control" id="searchInput" placeholder="Search files..."
                                    style="width:200px; height:32px; font-size:0.85rem;">
                                <button class="btn btn-ghost btn-sm" onclick="searchFiles()"><i data-lucide="search"
                                        style="width:14px;height:14px;"></i></button>
                            </div>
                        </div>
                        <div class="card-body" style="padding:0;">
                            <div class="fm-toolbar"
                                style="padding:8px 16px; border-bottom:1px solid var(--border-color);">
                                <button class="btn btn-ghost btn-sm" onclick="navigateUp()"><i data-lucide="arrow-up"
                                        style="width:14px;height:14px;"></i> Up</button>
                                <button class="btn btn-ghost btn-sm" onclick="refreshDir()"><i data-lucide="refresh-cw"
                                        style="width:14px;height:14px;"></i> Refresh</button>
                                <button class="btn btn-primary btn-sm" onclick="showCreateModal('file')"><i
                                        data-lucide="file-plus" style="width:14px;height:14px;"></i> New File</button>
                                <button class="btn btn-primary btn-sm" onclick="showCreateModal('dir')"><i
                                        data-lucide="folder-plus" style="width:14px;height:14px;"></i> New
                                    Folder</button>
                                <button class="btn btn-ghost btn-sm" onclick="showUploadModal()"><i data-lucide="upload"
                                        style="width:14px;height:14px;"></i> Upload</button>
                                <div class="fm-info" id="dirInfo" style="margin-left:auto;"></div>
                            </div>
                            <div class="table-container">
                                <table class="fm-table">
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Size</th>
                                            <th>Permissions</th>
                                            <th>Modified</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="fileList"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Editor View -->
                <div class="editor-container" id="editorView">
                    <div class="card">
                        <div class="card-header">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <button class="btn btn-ghost btn-sm" onclick="closeEditor()"><i data-lucide="arrow-left"
                                        style="width:14px;height:14px;"></i> Back</button>
                                <h3 id="editorTitle">Editing file</h3>
                                <span class="badge badge-info" id="editorLang">text</span>
                            </div>
                            <button class="btn btn-primary btn-sm" onclick="saveFile()"><i data-lucide="save"
                                    style="width:14px;height:14px;"></i> Save</button>
                        </div>
                        <div class="card-body">
                            <textarea class="editor-textarea" id="editorContent" spellcheck="false"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Modal -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="createModalTitle">New File</h3>
                <button class="modal-close" onclick="closeModal('createModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" id="createName" placeholder="filename.txt">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('createModal')">Cancel</button>
                <button class="btn btn-primary" id="createBtn" onclick="createItem()">Create</button>
            </div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal-overlay" id="renameModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Rename</h3>
                <button class="modal-close" onclick="closeModal('renameModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>New name</label>
                    <input type="text" class="form-control" id="renameName">
                    <input type="hidden" id="renamePath">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('renameModal')">Cancel</button>
                <button class="btn btn-primary" onclick="renameItem()">Rename</button>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Upload File</h3>
                <button class="modal-close" onclick="closeModal('uploadModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Select file</label>
                    <input type="file" id="uploadFile" class="form-control">
                </div>
                <div id="uploadProgress" style="display:none;">
                    <div class="stat-bar">
                        <div class="stat-bar-fill" id="uploadBar" style="width:0%"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('uploadModal')">Cancel</button>
                <button class="btn btn-primary" onclick="uploadFile()">Upload</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        let currentPath = '/';
        let createType = 'file';

        // SVG icon strings for file types
        const fileIcons = {
            folder: '<svg class="fm-icon folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></svg>',
            file: '<svg class="fm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>',
            code: '<svg class="fm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m10 13-2 2 2 2"/><path d="m14 17 2-2-2-2"/></svg>',
            image: '<svg class="fm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>',
            config: '<svg class="fm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
            archive: '<svg class="fm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 22h2a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v3"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><circle cx="10" cy="20" r="2"/><path d="M10 7V6"/><path d="M10 12v-1"/><path d="M10 18v-2"/></svg>',
            database: '<svg class="fm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>',
        };

        function getFileIcon(ext, isDir) {
            if (isDir) return fileIcons.folder;
            const codeExts = ['php', 'js', 'css', 'html', 'py', 'go', 'ts', 'jsx', 'tsx', 'rb', 'rs', 'c', 'cpp', 'h', 'java', 'sh', 'bash'];
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'ico', 'bmp'];
            const configExts = ['yml', 'yaml', 'toml', 'ini', 'conf', 'env', 'json', 'xml'];
            const archiveExts = ['zip', 'tar', 'gz', 'bz2', 'rar', '7z', 'xz'];
            const dbExts = ['sql', 'db', 'sqlite', 'sqlite3'];

            if (codeExts.includes(ext)) return fileIcons.code;
            if (imageExts.includes(ext)) return fileIcons.image;
            if (configExts.includes(ext)) return fileIcons.config;
            if (archiveExts.includes(ext)) return fileIcons.archive;
            if (dbExts.includes(ext)) return fileIcons.database;
            return fileIcons.file;
        }

        async function loadDir(path) {
            currentPath = path || '/';
            const data = await API.get('/files/browse?path=' + encodeURIComponent(currentPath));
            if (!data.success) { showToast(data.error, 'error'); return; }

            const r = data.data;

            // Breadcrumb
            document.getElementById('breadcrumb').innerHTML = r.breadcrumb.map((p, i) =>
                (i > 0 ? '<span class="sep">/</span>' : '') +
                `<a href="#" onclick="loadDir('${p.path}'); return false;">${p.name}</a>`
            ).join('');

            // Info
            document.getElementById('dirInfo').textContent = `${r.total_dirs} folders, ${r.total_files} files`;

            // File list
            const body = document.getElementById('fileList');
            if (r.items.length === 0) {
                body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>Empty directory</p></div></td></tr>';
                return;
            }

            body.innerHTML = r.items.map(f => {
                const icon = getFileIcon(f.extension, f.is_dir);
                const size = f.is_dir ? '—' : formatBytes(f.size);
                const mod = new Date(f.mod_time).toLocaleString();
                const clickAction = f.is_dir
                    ? `loadDir('${f.path}')`
                    : `editFile('${f.path}')`;

                return `<tr>
                    <td><span class="name" onclick="${clickAction}">${icon}${f.name}${f.is_symlink ? ' →' : ''}</span></td>
                    <td style="color:var(--text-muted);">${size}</td>
                    <td style="font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--text-muted);">${f.mode}</td>
                    <td style="color:var(--text-muted); font-size:0.8rem;">${mod}</td>
                    <td>
                        <div class="fm-actions">
                            <button onclick="showRenameModal('${f.path}', '${f.name}')" title="Rename"><i data-lucide="pencil" style="width:14px;height:14px;"></i></button>
                            <button onclick="downloadItem('${f.path}')" title="Download"><i data-lucide="download" style="width:14px;height:14px;"></i></button>
                            <button onclick="deleteItem('${f.path}', '${f.name}')" title="Delete"><i data-lucide="trash-2" style="width:14px;height:14px;"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
            lucide.createIcons();
        }

        function navigateUp() {
            const parent = currentPath.split('/').slice(0, -1).join('/') || '/';
            loadDir(parent);
        }

        function refreshDir() { loadDir(currentPath); }

        async function editFile(path) {
            const data = await API.get('/files/read?path=' + encodeURIComponent(path));
            if (!data.success) { showToast(data.error, 'error'); return; }

            document.getElementById('browserView').style.display = 'none';
            document.getElementById('editorView').classList.add('active');
            document.getElementById('editorTitle').textContent = data.data.name;
            document.getElementById('editorLang').textContent = data.data.language;
            document.getElementById('editorContent').value = data.data.content;
            document.getElementById('editorContent').dataset.path = data.data.path;
            if (data.data.read_only) document.getElementById('editorContent').readOnly = true;
            lucide.createIcons();
        }

        function closeEditor() {
            document.getElementById('editorView').classList.remove('active');
            document.getElementById('browserView').style.display = 'block';
            document.getElementById('editorContent').readOnly = false;
        }

        async function saveFile() {
            const path = document.getElementById('editorContent').dataset.path;
            const content = document.getElementById('editorContent').value;
            const data = await API.post('/files/write', { path, content });
            if (data.success) showToast('File saved', 'success');
            else showToast(data.error, 'error');
        }

        function showCreateModal(type) {
            createType = type;
            document.getElementById('createModalTitle').textContent = type === 'dir' ? 'New Folder' : 'New File';
            document.getElementById('createName').value = '';
            document.getElementById('createName').placeholder = type === 'dir' ? 'folder-name' : 'filename.txt';
            document.getElementById('createModal').classList.add('active');
        }

        async function createItem() {
            const name = document.getElementById('createName').value;
            if (!name) return;
            const path = currentPath + (currentPath.endsWith('/') ? '' : '/') + name;
            const data = await API.post('/files/create', { path, is_dir: createType === 'dir' });
            if (data.success) { showToast('Created', 'success'); closeModal('createModal'); refreshDir(); }
            else showToast(data.error, 'error');
        }

        function showRenameModal(path, name) {
            document.getElementById('renamePath').value = path;
            document.getElementById('renameName').value = name;
            document.getElementById('renameModal').classList.add('active');
        }

        async function renameItem() {
            const path = document.getElementById('renamePath').value;
            const newName = document.getElementById('renameName').value;
            const data = await API.post('/files/rename', { path, new_name: newName });
            if (data.success) { showToast('Renamed', 'success'); closeModal('renameModal'); refreshDir(); }
            else showToast(data.error, 'error');
        }

        async function deleteItem(path, name) {
            if (!confirm('Delete ' + name + '? This cannot be undone.')) return;
            const data = await API.post('/files/delete', { path });
            if (data.success) { showToast('Deleted', 'success'); refreshDir(); }
            else showToast(data.error, 'error');
        }

        function downloadItem(path) {
            window.open('/api/files/download?path=' + encodeURIComponent(path), '_blank');
        }

        function showUploadModal() { document.getElementById('uploadModal').classList.add('active'); }

        async function uploadFile() {
            const input = document.getElementById('uploadFile');
            if (!input.files.length) return;

            const formData = new FormData();
            formData.append('file', input.files[0]);
            formData.append('path', currentPath);

            const resp = await fetch('/api/files/upload', { method: 'POST', body: formData, credentials: 'same-origin' });
            const data = await resp.json();
            if (data.success) { showToast('Uploaded: ' + data.data.filename, 'success'); closeModal('uploadModal'); refreshDir(); }
            else showToast(data.error, 'error');
        }

        async function searchFiles() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            const data = await API.get('/files/search?path=' + encodeURIComponent(currentPath) + '&query=' + encodeURIComponent(query));
            if (!data.success) { showToast(data.error, 'error'); return; }

            const body = document.getElementById('fileList');
            if (!data.data || data.data.length === 0) {
                body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No results for "' + query + '"</p></div></td></tr>';
                return;
            }
            body.innerHTML = data.data.map(f => `<tr>
                <td><span class="name" onclick="${f.is_dir ? `loadDir('${f.path}')` : `editFile('${f.path}')`}">${getFileIcon(f.extension, f.is_dir)}${f.name}</span></td>
                <td style="color:var(--text-muted);">${f.is_dir ? '—' : formatBytes(f.size)}</td>
                <td></td>
                <td style="color:var(--text-muted); font-size:0.8rem;">${f.mod_time || ''}</td>
                <td><span style="font-size:0.75rem; color:var(--text-muted);">${f.path}</span></td>
            </tr>`).join('');
        }

        document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') searchFiles(); });

        // Init — check for ?path= query param (e.g. from Sites page "Files" button)
        const urlParams = new URLSearchParams(window.location.search);
        loadDir(urlParams.get('path') || '/');
        lucide.createIcons();
    </script>
</body>

</html>
{{end}}
